name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests + JS lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Python deps
        run: pip install -r requirements-dev.txt
      - name: JS syntax check (node --check)
        run: |
          set -e
          for f in $(find static/js -name '*.js' -not -path '*/vendor/*'); do
            node --check "$f"
          done
      - name: pytest
        run: python -m pytest -q
        # OCR tests self-skip without tessdata; LibreOffice tests handle a
        # missing soffice — so the suite is green on a clean runner.

  e2e:
    name: Frontend smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Install Node deps
        run: npm install
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Generate fixtures
        run: python tests/e2e/make_fixtures.py
      - name: Run smoke tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
