<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="yr-api-token" content="{{ api_token }}">
  <title>YancoRead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/static/assets/logo-mark.png">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/readers.css">
</head>
<body>
  <canvas id="starfield"></canvas>
  <div id="ambient"></div>

  <div id="app" data-mode="home">
    <!-- Adaptive top bar: tools mount into .tb-tools per document kind -->
    <header id="topbar">
      <div class="tb-left">
        <button class="tb-btn icon" id="btn-home" title="Home" aria-label="Home">⌂</button>
        <button class="tb-btn icon hidden" id="btn-sidebar" title="Toggle panel" aria-label="Toggle panel">☰</button>
        <span class="doc-kind-badge hidden" id="doc-kind"></span>
        <span class="doc-title" id="doc-title"></span>
      </div>
      <div class="tb-tools" id="tb-tools"></div>
      <div class="tb-right">
        <span class="tb-actions" id="tb-actions"></span>
        <span class="tb-divider" id="tb-actions-sep" hidden></span>
        <button class="tb-btn icon" id="btn-open" title="Open file" aria-label="Open file">＋</button>
        <button class="tb-btn icon" id="btn-settings" title="Settings" aria-label="Settings">⚙</button>
        <button class="tb-btn icon" id="btn-fullscreen" title="Fullscreen" aria-label="Fullscreen">⛶</button>
      </div>
    </header>

    <div id="body">
      <nav id="rail"></nav>
      <aside id="sidebar" class="collapsed"></aside>
      <main id="stage">
        <!-- Home screen -->
        <section id="home">
          <div class="home-wrap">
            <div class="home-hero">
              <img class="home-wordmark" src="/static/assets/logo-word-t.png" alt="YancoRead">
            </div>
            <div class="drop-zone">
              <div class="dz-icon">📂</div>
              <div class="dz-text">Drop a file here, or browse to open one</div>
              <div class="dz-actions">
                <button class="btn-primary" id="home-open"><span class="gl">📂</span><span>Open a file</span></button>
              </div>
              <div class="fmt-chips">
                <span class="fmt-chip"><span class="dot" style="background:#4aa6ff"></span>PDF</span>
                <span class="fmt-chip"><span class="dot" style="background:#a78bff"></span>CBZ · CBR</span>
                <span class="fmt-chip"><span class="dot" style="background:#f5b14e"></span>EPUB · MOBI</span>
                <span class="fmt-chip"><span class="dot" style="background:#ff7d6b"></span>DOCX · PPTX · XLSX</span>
                <span class="fmt-chip"><span class="dot" style="background:#34e6a4"></span>Text · Code</span>
                <span class="fmt-chip"><span class="dot" style="background:#21e08c"></span>Images</span>
              </div>
            </div>
            <div class="home-section-head">
              <h2>Continue reading</h2>
              <button class="linkbtn hidden" id="clear-recent">Clear all</button>
            </div>
            <div class="recent-grid" id="recent-grid"></div>
            <div class="privacy">
              <span class="gl">✓</span>
              <span>No uploads, ever</span>
              <span class="pdot"></span>
              <span>On-device AI</span>
              <span class="pdot"></span>
              <span>Local files only</span>
            </div>
          </div>
        </section>
      </main>
      <aside id="rpanel" class="collapsed"></aside>
    </div>
  </div>

  <div id="drop-overlay" class="hidden">
    <div class="drop-box">Drop to open<small>PDF · CBZ/CBR · EPUB · DOCX · TXT · and more</small></div>
  </div>
  <div id="toasts" role="status" aria-live="polite"></div>

  <script src="/static/js/vendor/ssf.js"></script>
  <script src="/static/js/starfield.js"></script>
  <script src="/static/js/app.js"></script>
  <script src="/static/js/settings.js"></script>
  <script src="/static/js/readers/pdf.js"></script>
  <script src="/static/js/readers/comic.js"></script>
  <script src="/static/js/readers/ebook.js"></script>
  <script src="/static/js/readers/office.js"></script>
  <script src="/static/js/readers/text.js"></script>
  <script src="/static/js/readers/image.js"></script>
  <script>window.YR && YR.init();</script>
</body>
</html>
